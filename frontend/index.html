<!doctype html>
<html lang="en">
  <head>
    <script>
      try {
        var p = localStorage.getItem('altcode_theme_preference')
        var resolved
        if (p === 'dark' || p === 'light') resolved = p
        else if (p === 'system' || !p)
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches
            ? 'dark'
            : 'light'
        else {
          var leg = localStorage.getItem('altcode_theme')
          resolved = leg === 'light' || leg === 'dark' ? leg : 'dark'
        }
        document.documentElement.setAttribute('data-theme', resolved)
      } catch (e) {}
    </script>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&family=Space+Grotesk:wght@300..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AltCode — v1.0</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
